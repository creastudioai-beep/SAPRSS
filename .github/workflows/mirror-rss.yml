name: Mirror RSS from Site

on:
  schedule:
    - cron: '*/15 * * * *'  # Каждые 15 минут
  workflow_dispatch:        # Ручной запуск

jobs:
  mirror-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch RSS from Site
        run: |
          curl -sSL --retry 3 --retry-delay 5 \
            -H "User-Agent: GitHub-Action-RSS-Mirror/1.0" \
            https://sochiautoparts.ru/rss.xml \
            -o data/rss.xml
      
      - name: Validate RSS
        run: |
          if [ ! -s data/rss.xml ]; then
            echo "❌ RSS file is empty or fetch failed"
            exit 1
          fi
          # Проверка на валидный XML
          if ! xmllint --noout data/rss.xml 2>/dev/null; then
            echo "⚠️  RSS is not valid XML, but saving anyway"
          fi
          echo "✅ RSS fetched successfully"
      
      - name: Commit and Push RSS
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/rss.xml
          if git diff --staged --quiet; then
            echo "No changes to RSS"
          else
            git commit -m "📡 Mirror RSS from site ($(date -u +%Y-%m-%d\ %H:%M:%S\ UTC))"
            git push
            echo "✅ RSS updated in repository"
          fi
